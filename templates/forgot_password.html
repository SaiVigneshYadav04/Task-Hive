<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Task-Hive</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>

<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='images/Icon.png') }}" alt="Task-Hive Logo">
                </div>
                <span class="logo-text">Task-Hive</span>
            </div>

            <nav class="nav">
                <a href="home_page.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About Us</a>
                <a href="login_page.html" class="nav-link">Login</a>
            </nav>

            <a href="register.html" class="btn btn-primary">Get Started</a>
            </a>
        </div>
    </header>

    <section class="login-section">
        <div class="auth-container flex-col items-center">
            <div class="card glass auth-card text-center" style="width: 100%; max-width: 500px;">
                <div class="forgot-icon" style="margin-bottom: 1.5rem;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" style="margin: 0 auto; display: block;">
                        <circle cx="12" cy="12" r="10" stroke="var(--primary)" stroke-width="2" />
                        <path d="M12 8V12M12 16H12.01" stroke="var(--primary)" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </div>

                <div class="mb-4">
                    <h1 class="login-title mb-1" style="font-size: 2rem;">Forgot Password?</h1>
                    <p class="text-muted" id="form-subtitle">
                        No worries! Enter your email address and we'll send you an OTP to reset your password.
                    </p>
                </div>

                <form id="email-form" class="login-form" style="text-align: left;">
                    <div class="form-group mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" style="width: 100%;" id="send-btn">Send
                        OTP</button>
                </form>

                <form id="otp-form" class="login-form flex-col gap-4" style="display: none; text-align: left;">
                    <div class="form-group">
                        <label for="otp" class="form-label">Enter 6-Digit OTP</label>
                        <input type="text" id="otp" class="form-input" placeholder="123456" required maxlength="6"
                            style="text-align: center; font-size: 1.25rem; letter-spacing: 0.5rem; font-weight: 800;">
                    </div>
                    <div class="form-group mb-4">
                        <label for="new-password" class="form-label">New Password</label>
                        <input type="password" id="new-password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" style="width: 100%;" id="reset-btn">Reset
                        Password</button>
                </form>

                <div class="login-footer mt-4">
                    <p class="text-center">
                        <a href="/login" class="back-link flex items-center justify-center gap-4"
                            style="color: var(--primary); text-decoration: none; font-weight: 600;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            Back to Login
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-brand">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='images/Icon.png') }}" alt="Task-Hive Logo">
                </div>
                <div>
                    <span class="footer-logo-text">Task-Hive</span>
                    <p class="footer-description">
                        Hyperlocal errand marketplace connecting task<br>
                        posters with eager workers.
                    </p>
                </div>
            </div>

            <div class="footer-copyright">
                © 2026 Task-Hive. All rights reserved.
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.getElementById('email-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('send-btn');

            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                const res = await fetch('/send-reset-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (data.error) {
                    Swal.fire('Oops!', data.error, 'error');
                    btn.innerText = "Send OTP";
                    btn.disabled = false;
                } else {
                    Swal.fire('Sent!', data.message, 'success');
                    document.getElementById('email-form').style.display = 'none';
                    document.getElementById('otp-form').style.display = 'flex';
                    document.getElementById('form-subtitle').innerText = "Check your inbox! Enter the OTP below to set a new password.";
                    document.getElementById('form-subtitle').style.color = "#047857";
                    document.getElementById('form-subtitle').style.fontWeight = "bold";
                }
            } catch (err) {
                Swal.fire('Error', 'Internal server error. Please try again.', 'error');
                btn.innerText = "Send OTP";
                btn.disabled = false;
            }
        });

        document.getElementById('otp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('otp').value;
            const new_password = document.getElementById('new-password').value;
            const btn = document.getElementById('reset-btn');

            btn.innerText = "Resetting...";
            btn.disabled = true;

            try {
                const res = await fetch('/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp, new_password })
                });
                const data = await res.json();

                if (data.error) {
                    Swal.fire('Error', data.error, 'error');
                    btn.innerText = "Reset Password";
                    btn.disabled = false;
                } else {
                    await Swal.fire('Success!', data.message, 'success');
                    window.location.href = "/login";
                }
            } catch (err) {
                Swal.fire('Error', 'Internal server error. Please try again.', 'error');
                btn.innerText = "Reset Password";
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
