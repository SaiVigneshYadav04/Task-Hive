<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task History - Task-Hive</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="dashboard-header-content">
                <div class="logo">
                    <img src="{{ url_for('static', filename='images/Icon.png') }}" width="40" alt="Task-Hive Logo">
                    <span class="logo-text" style="font-size: 1.5rem; font-weight: 700; color: #1f2937;">Task-Hive</span>
                </div>
                <div class="profile-menu" style="display: flex; align-items: center; gap: 0.75rem;">
                    <a href="/profile" class="avatar">
                        {% if user.profile_pic %}<img src="{{ url_for('static', filename='uploads/' + user.profile_pic) }}">{% else %}{{ user.name[0] | upper }}{% endif %}
                    </a>
                    <span class="profile-name">{{ user.name }}</span>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="/dashboard" class="sidebar-link">Dashboard</a>
                <a href="/dashboard#available-tasks-section" class="sidebar-link">Available Tasks</a>
                <a href="/dashboard#post-task-section" class="sidebar-link">Post a Task</a>
                <a href="/dashboard#my-tasks-section" class="sidebar-link">My Tasks</a>
                <a href="/leaderboard" class="sidebar-link">Leaderboard</a>
                <a href="/history" class="sidebar-link active">History</a>
            </nav>
            <div style="margin-top: auto;">
                <a href="/profile" class="sidebar-link" style="display: block;">Profile</a>
                <a href="/logout" class="sidebar-link" style="display: block; color: #ef4444; margin-top: 1rem;">Logout</a>
            </div>
        </aside>

        <main class="dashboard-main">
            <div class="container" style="max-width: 800px; padding-top: 2rem;">
                
                <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; color: #fff;">Task History</h1>
                <p style="font-size: 1.1rem; margin-bottom: 2rem; color: var(--text-muted);">Review the tasks you've completed and the jobs you've hired for.</p>

                <div style="margin-bottom: 2rem;">
                    <select id="history-filter" onchange="filterHistory(this.value)" style="width: 100%; max-width: 300px; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid #d1d5db; font-size: 1rem; font-weight: bold; background-color: white; cursor: pointer; outline: none;">
                        <option value="all">View All History</option>
                        <option value="posted">Tasks I Posted (Hired)</option>
                        <option value="worked">Tasks I Completed (Worked)</option>
                    </select>
                </div>

                <div id="history-list" style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 4rem;">
                    </div>

            </div>
        </main>
    </div>

    <script>
        let allHistoryData = [];

        function loadHistory() {
            fetch("/api/history")
                .then(res => res.json())
                .then(data => {
                    allHistoryData = data;
                    renderHistory("all");
                });
        }

        function filterHistory(filterValue) {
            renderHistory(filterValue);
        }

        function renderHistory(filterValue) {
            const container = document.getElementById("history-list");
            container.innerHTML = "";

            let filteredData = allHistoryData;
            if (filterValue !== "all") {
                filteredData = allHistoryData.filter(task => task.role === filterValue);
            }

            if (filteredData.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 3rem; background: white; border-radius: 1rem; border: 1px solid #e5e7eb;"><p style="color: #6b7280; font-size: 1.1rem;">No history found in this category.</p></div>`;
                return;
            }

            filteredData.reverse().forEach(task => {
                let roleTag = task.role === "posted" 
                    ? `<span style="background: rgba(251, 191, 36, 0.2); color: #b45309; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase;">I was the Poster</span>`
                    : `<span style="background: rgba(59, 228, 119, 0.2); color: #047857; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase;">I was the Worker</span>`;

                let interactionText = task.role === "posted" ? `Worked by: ${task.other_person}` : `Posted by: ${task.other_person}`;

                container.innerHTML += `
                    <div class="card glass mb-3">
                        <div class="flex justify-between items-center">
                            <div>
                                ${roleTag}
                                <h3 style="margin: 0.5rem 0 0 0; font-size: 1.25rem; font-weight: 800; color: #fff;">${task.title}</h3>
                                <span style="font-size: 0.85rem; color: var(--text-muted); text-transform: capitalize;">${task.category} • ${interactionText}</span>
                            </div>
                            <div style="text-align: right;">
                                <span style="display: block; font-size: 1.5rem; font-weight: 900; color: var(--primary);">₹${task.payment}</span>
                                <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase;">Fully Paid</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        loadHistory();
    </script>
</body>
</html>
